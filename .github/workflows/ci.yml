name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      PORT: 4000
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      JWT_ACCESS_SECRET: test_access_secret_minimum_32_characters_long
      JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_characters_long
      CORS_ORIGIN: http://localhost:5173
      WEB_APP_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npm run build --workspace=@ascendx/shared
        working-directory: .
      - run: npm test --workspace=ascendx-ai-backend
        working-directory: .

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - run: npm ci
      - run: npm run build --workspace=@ascendx/shared
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web

  web-e2e:
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npx playwright install chromium --with-deps
        working-directory: web
      - run: npm run build
        working-directory: web
      - run: npm run test:e2e
        working-directory: web

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
        working-directory: mobile
      - run: npx tsc --noEmit
        working-directory: mobile
